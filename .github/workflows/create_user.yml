name: Create User

on: 
  issues:
    types: [labeled]

jobs:
  provision_user:
    if: github.event.label.name == 'user-provisioning'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Parse Issue Body (Grab contents)
        id: parse
        uses: stefanbuck/github-issue-parser@v3
        with:
          template-path: .github/ISSUE_TEMPLATE/create_user.yml

      - name: Print User Details
        run: | 
            echo "Print User Details: "
            echo "Full name: ${{ steps.parse.outputs.issueparser_full-name }}"
            echo "Email: ${{ steps.parse.outputs.issueparser_email }}"
            echo "Team: ${{ steps.parse.outputs.issueparser_team }}"
            echo "Role: ${{ steps.parse.outputs.issueparser_role }}"
            echo "Start date: ${{ steps.parse.outputs.issueparser_start-date }}"

